name: Vista Context Wrapper

on:
  workflow_dispatch:
    inputs:
      source_repo:
        required: true
        type: string
      source_branch:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      event_type:
        required: true
        type: string
      pull_request_number:
        required: false
        type: string
      vista_context_json:
        required: true
        type: string

jobs:
  context:
    runs-on: ubuntu-latest

    steps:
      - name: Print context
        run: |
          echo '${{ inputs.vista_context_json }}' > vista-context.json
          cat vista-context.json

      - name: Extract Vista context
        id: ctx
        run: |
          POLICY=$(jq -r '.policy' vista-context.json)
          APP_NAME=$(jq -r '.veracode_application_name' vista-context.json)

          echo "policy=$POLICY" >> "$GITHUB_OUTPUT"
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Extract repository details
        id: repo
        run: |
          FULL_REPO="${{ inputs.source_repo }}"
          OWNER=$(echo "$FULL_REPO" | cut -d'/' -f1)
          REPO=$(echo "$FULL_REPO" | cut -d'/' -f2)

          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"

      - name: Use context in scan
        run: |
          echo "Source Repo: ${{ inputs.source_repo }}"
          echo "Owner: ${{ steps.repo.outputs.owner }}"
          echo "Repo: ${{ steps.repo.outputs.repo }}"
          echo "Branch: ${{ inputs.source_branch }}"
          echo "Commit: ${{ inputs.commit_sha }}"
          echo "App Name: ${{ steps.ctx.outputs.app_name }}"
          echo "Policy: ${{ steps.ctx.outputs.policy }}"

      - name: Generate Vista GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.VISTA_GITHUB_APP_ID }}
          private-key: ${{ secrets.VISTA_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ steps.repo.outputs.owner }}
          repositories: ${{ steps.repo.outputs.repo }}

      - name: Trigger Veracode Scan
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = '${{ steps.repo.outputs.owner }}';
            const repo = '${{ steps.repo.outputs.repo }}';
            const branch = '${{ inputs.source_branch }}';

            const command = `Veracode Static Scan [branch: ${branch}]`;

            console.log(`Triggering Veracode scan for ${owner}/${repo}`);
            console.log(`Command: ${command}`);

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: 1,
              body: command
            });
