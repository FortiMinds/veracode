name: Veracode Static Code Analysis

run-name: Static Code Analysis - ${{ github.event.client_payload.repository.name }}

concurrency:
  group: ${{ github.event.client_payload.event_type }}-${{ github.event.client_payload.repository.name }}-${{ github.event.client_payload.repository.branch }}
  cancel-in-progress: true

on:
  repository_dispatch:
    types:
      - source-code-pipeline-scan
      - source-code-policy-scan
      - dot-net-pipeline-scan
      - dot-net-policy-scan
      - go-pipeline-scan
      - go-policy-scan
      - tsql-pipeline-scan
      - tsql-policy-scan
      - plsql-pipeline-scan
      - plsql-policy-scan
      - php-pipeline-scan
      - php-policy-scan
      - scala-pipeline-scan
      - scala-policy-scan
      - dart-pipeline-scan
      - dart-policy-sca
      - java-pipeline-scan
      - java-policy-scan
      - unidentified-lang-pipeline-scan
      - unidentified-lang-policy-scan
      - ruby-pipeline-scan
      - ruby-policy-scan

jobs:
  cleanup:
    uses: ./.github/workflows/veracode-clean-up.yml
    with:
      runs_on: ${{ github.event.client_payload.user_config.default_runs_on }}

  register:
    needs: cleanup
    uses: ./.github/workflows/veracode-check-run.yml
    with:
      check_run_name: ${{ github.workflow }} - ${{ contains(github.event.action, 'policy') && 'Policy' || 'Pipeline' }}
      head_sha: ${{ github.event.client_payload.sha }}
      repository_owner: ${{ github.event.client_payload.repository.owner }}
      repository_name: ${{ github.event.client_payload.repository.name }}
      event_type: ${{ github.event.client_payload.event_type }}
      github_token: ${{ github.event.client_payload.token }}
      run_id: ${{ github.run_id }}
      branch: ${{ github.event.client_payload.repository.branch }}
      default_runs_on: ${{ github.event.client_payload.user_config.default_runs_on }}

  vista_context:
    needs: register
    uses: ./.github/workflows/vista-context-resolver.yml
    with:
      repo_name: ${{ github.event.client_payload.repository.name }}
      full_name: ${{ github.event.client_payload.repository.full_name }}
      org_name: ${{ github.event.client_payload.repository.owner }}
      branch: ${{ github.event.client_payload.repository.branch }}
      commit_sha: ${{ github.event.client_payload.sha }}
      event_type: ${{ github.event.client_payload.event_type }}
    secrets: inherit

  vista_manifest_writeback:
    needs: vista_context
    if: |
      always() &&
      needs.vista_context.outputs.onboarded == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Write Vista Manifest to Repository
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.event.client_payload.token }}
          script: |
            const owner = '${{ github.event.client_payload.repository.owner }}';
            const repo = '${{ github.event.client_payload.repository.name }}';
            const branch = '${{ github.event.client_payload.repository.branch }}';
            const filePath = 'vista_manifest.yaml';

            const manifest = [
              'version: 1',
              '',
              'repository:',
              '  name: "${{ github.event.client_payload.repository.name }}"',
              '  full_name: "${{ github.event.client_payload.repository.full_name }}"',
              '  branch: "${{ github.event.client_payload.repository.branch }}"',
              '  commit_sha: "${{ github.event.client_payload.sha }}"',
              '',
              'business_application:',
              '  name: "${{ needs.vista_context.outputs.profile_name }}"',
              '  criticality: "${{ needs.vista_context.outputs.criticality }}"',
              '',
              'veracode:',
              '  profile_name: "${{ needs.vista_context.outputs.profile_name }}"',
              '  policy_name: "${{ needs.vista_context.outputs.policy_name }}"',
              '  app_guid: "${{ needs.vista_context.outputs.app_guid }}"',
              '',
              'vista:',
              '  managed: true',
              '  generated_by: "vista-context-resolver"',
              '  generated_at: "' + new Date().toISOString() + '"',
              ''
            ].join('\n');

            let sha;

            try {
              const existingFile = await github.rest.repos.getContent({
                owner: owner,
                repo: repo,
                path: filePath,
                ref: branch
              });

              if (!Array.isArray(existingFile.data)) {
                sha = existingFile.data.sha;
                console.log('Existing vista_manifest.yaml found. SHA: ' + sha);
              }
            } catch (error) {
              if (error.status === 404) {
                console.log('vista_manifest.yaml does not exist. Creating new file.');
              } else {
                throw error;
              }
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: owner,
              repo: repo,
              path: filePath,
              message: 'chore: update Vista manifest',
              content: Buffer.from(manifest).toString('base64'),
              branch: branch,
              sha: sha
            });

            console.log('vista_manifest.yaml written to ' + owner + '/' + repo + '@' + branch);
                

  vista_compliance:
    needs: vista_context
    if: |
      always() &&
      needs.vista_context.outputs.onboarded == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Create Compliance Annotation
        run: |
          echo "::warning::Vista Compliance Check Failed"
          echo "::warning::${{ needs.vista_context.outputs.compliance_message }}"

  vista_pr_comment:
    needs: vista_context
    if: |
      always() &&
      needs.vista_context.outputs.onboarded == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Add Vista Compliance Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.event.client_payload.token }}
          script: |
            const owner = '${{ github.event.client_payload.repository.owner }}';
            const repo = '${{ github.event.client_payload.repository.name }}';
            const sha = '${{ github.event.client_payload.sha }}';

            let prNumber =
              Number('${{ github.event.client_payload.pr_number }}') ||
              Number('${{ github.event.client_payload.pull_request_number }}') ||
              Number('${{ github.event.client_payload.pull_request_num }}');

            if (!prNumber) {
              console.log(`PR number not present in payload. Looking up PR by commit SHA: ${sha}`);

              const pulls = await github.request(
                'GET /repos/{owner}/{repo}/commits/{ref}/pulls',
                {
                  owner,
                  repo,
                  ref: sha,
                  headers: {
                    accept: 'application/vnd.github+json'
                  }
                }
              );

              if (pulls.data && pulls.data.length > 0) {
                prNumber = pulls.data[0].number;
                console.log(`Found PR #${prNumber}`);
              }
            }

            if (!prNumber) {
              console.log('No PR found for this scan event. Skipping PR comment.');
              return;
            }

            const message = [
              '⚠️ Vista Compliance Check Failed',
              '',
              `Repository: ${{ github.event.client_payload.repository.full_name }}`,
              '',
              `${{ needs.vista_context.outputs.compliance_message }}`,
              '',
              'Required Actions:',
              '1. Login to Vista',
              '2. Create or map a Business Application',
              '3. Associate this repository',
              '4. Configure Veracode application mapping',
              '5. Re-run the pull request',
              '',
              'Control ID: VISTA-CONTEXT-001',
              'Severity: HIGH'
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: message
            });

            console.log(`Vista compliance comment added to PR #${prNumber}`);

  validations:
    needs: [register, vista_context]
    if: |
      always() &&
      needs.vista_context.outputs.onboarded == 'true'
    runs-on: ${{ fromJson(github.event.client_payload.user_config.default_runs_on) }}
    name: Validations
    steps:
      - name: Verify Veracode API credentials
        id: verify_api_creds
        uses: veracode/github-actions-integration-helper@v0.1.9
        with:
          action: validateVeracodeApiCreds
          token: ${{ github.event.client_payload.token }}
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          appname: ${{ needs.vista_context.outputs.profile_name }}
          source_repository: ${{ github.event.client_payload.repository.full_name }}
          check_run_id: ${{ needs.register.outputs.run_id }}

      - name: Verify Policy name
        id: verify_policy_name
        if: success()
        uses: veracode/github-actions-integration-helper@v0.1.9
        with:
          action: validatePolicyName
          token: ${{ github.event.client_payload.token }}
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          appname: ${{ needs.vista_context.outputs.profile_name }}
          source_repository: ${{ github.event.client_payload.repository.full_name }}
          check_run_id: ${{ needs.register.outputs.run_id }}
          policyname: ${{ needs.vista_context.outputs.policy_name }}
          path: ${{ github.event.client_payload.annotationObj.path }}
          start_line: ${{ github.event.client_payload.annotationObj.start_line }}
          end_line: ${{ github.event.client_payload.annotationObj.end_line }}
          break_build_invalid_policy: ${{ github.event.client_payload.break_build_invalid_policy }}

  build:
    needs: [validations, vista_context]
    if: |
      always() &&
      needs.vista_context.outputs.onboarded == 'true' &&
      needs.validations.result == 'success'
    uses: ./.github/workflows/veracode-build-artifact-for-scanning.yml
    with:
      repository: ${{ github.event.client_payload.repository.full_name }}
      ref: ${{ github.event.client_payload.sha }}
      token: ${{ github.event.client_payload.token }}
      event_name: ${{ github.event.action }}
      build_runs_on: ${{ github.event.client_payload.user_config.build_runs_on }}
      build_packager_image: ${{ github.event.client_payload.user_config.build_packager_image }}
      build_predependency_command: ${{ github.event.client_payload.user_config.build_predependency_command }}
      ruby_version: ${{ github.event.client_payload.user_config.ruby_version }}
      bundle_version: ${{ github.event.client_payload.user_config.bundle_version }}
      default_runs_on: ${{ github.event.client_payload.user_config.default_runs_on }}
      debug: ${{ github.event.client_payload.user_config.debug }}

  pipeline_scan:
    needs: [build, register, vista_context]
    if: |
      always() &&
      contains(github.event.action, 'pipeline') &&
      needs.vista_context.outputs.onboarded == 'true' &&
      needs.build.result == 'success'
    uses: ./.github/workflows/veracode-pipeline-scan.yml
    with:
      policy_name: ${{ needs.vista_context.outputs.policy_name }}
      create_code_scanning_alert: ${{ github.event.client_payload.user_config.create_code_scanning_alert }}
      owner: ${{ github.event.client_payload.repository.owner }}
      repo: ${{ github.event.client_payload.repository.name }}
      sha: ${{ github.event.client_payload.sha }}
      token: ${{ github.event.client_payload.token }}
      ref: ${{ github.event.client_payload.user_config.ref }}
      create_issue: ${{ github.event.client_payload.user_config.create_issue }}
      source_repository: ${{ github.event.client_payload.repository.full_name }}
      check_run_id: ${{ needs.register.outputs.run_id }}
      profile_name: ${{ needs.vista_context.outputs.profile_name }}
      break_build_policy_findings: ${{ github.event.client_payload.user_config.break_build_policy_findings }}
      break_build_on_error: ${{ github.event.client_payload.user_config.break_build_on_error }}
      filter_mitigated_flaws: ${{ github.event.client_payload.user_config.filter_mitigated_flaws }}
      language: ${{ github.event.client_payload.repository.language }}
      default_runs_on: ${{ github.event.client_payload.user_config.default_runs_on }}
      debug: ${{ github.event.client_payload.user_config.debug }}
    secrets: inherit

  policy_scan:
    needs: [build, register, vista_context]
    if: |
      always() &&
      contains(github.event.action, 'policy') &&
      needs.vista_context.outputs.onboarded == 'true' &&
      needs.build.result == 'success'
    uses: ./.github/workflows/veracode-policy-scan.yml
    with:
      profile_name: ${{ needs.vista_context.outputs.profile_name }}
      policy_name: ${{ needs.vista_context.outputs.policy_name }}
      modules_to_scan: ${{ github.event.client_payload.modules_to_scan }}
      owner: ${{ github.event.client_payload.repository.owner }}
      repo: ${{ github.event.client_payload.repository.name }}
      sha: ${{ github.event.client_payload.sha }}
      token: ${{ github.event.client_payload.token }}
      ref: ${{ github.event.client_payload.user_config.ref }}
      create_issue: ${{ github.event.client_payload.user_config.create_issue }}
      create_code_scanning_alert: ${{ github.event.client_payload.user_config.create_code_scanning_alert }}
      source_repository: ${{ github.event.client_payload.repository.full_name }}
      check_run_id: ${{ needs.register.outputs.run_id }}
      break_build_policy_findings: ${{ github.event.client_payload.user_config.break_build_policy_findings }}
      break_build_on_error: ${{ github.event.client_payload.user_config.break_build_on_error }}
      filter_mitigated_flaws: ${{ github.event.client_payload.user_config.filter_mitigated_flaws }}
      language: ${{ github.event.client_payload.repository.language }}
      default_runs_on: ${{ github.event.client_payload.user_config.default_runs_on }}
      debug: ${{ github.event.client_payload.user_config.debug }}
    secrets: inherit
